name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Only the build evaluates src/lib/seo.ts, which throws in production
      # builds without this var. Keep in sync with _siteUrlFallback there.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://driftpilot.ca

      # Perf gate (handoff doc §8, §15): thresholds and URLs live in
      # lighthouserc.json — perf ≥ 95, LCP < 1.5s, CLS < 0.05, TBT < 150ms,
      # script budget 260 kB (§15's 110 kB re-baselined against the ~237 kB
      # framework+shader reality measured on PR #17). Runs against the local
      # prod build; lab data only — complements @vercel/speed-insights field
      # metrics in production. a11y is asserted here too (≥ 0.98).
      - name: Lighthouse CI
        run: npx lhci autorun

      - name: Upload Lighthouse reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/reports
          retention-days: 14
