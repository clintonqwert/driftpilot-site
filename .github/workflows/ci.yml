name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Only the build evaluates src/lib/seo.ts, which throws in production
      # builds without this var. Keep in sync with _siteUrlFallback there.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://driftpilot.ca

      # TODO(phase 1 launch): Lighthouse CI against the Vercel preview URL
      # asserting perf ≥ 95, LCP < 1.5s, CLS < 0.05, TBT < 150ms, and a
      # first-load JS budget check (< 110 kB) — handoff doc §8, §15.
      # Lab data only — complements @vercel/speed-insights, which already
      # reports field (real-user) metrics in production; not duplicates.
